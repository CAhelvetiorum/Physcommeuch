<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Archive — A Catalog of Old Books</title>
  <meta name="description" content="A small personal catalog of old and classic books." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Display&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&family=Courier+Prime&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header class="drawer-header">
    <p class="eyebrow">Est. on a personal shelf</p>
    <h1>The Archive</h1>
    <p class="tagline">A small catalog of old books, kept the way a library once kept them.</p>
  </header>

  <section class="controls" aria-label="Search and filter">
    <div>
      <label class="field-label" for="search-input">Search</label>
      <input
        type="search"
        id="search-input"
        placeholder="Title or author…"
        autocomplete="off"
      />
    </div>

    <div>
      <label class="field-label" for="genre-select">Genre</label>
      <select id="genre-select">
        <option value="all">All genres</option>
      </select>
    </div>

    <div>
      <label class="field-label" for="sort-select">Sort by</label>
      <select id="sort-select">
        <option value="title-asc">Title, A–Z</option>
        <option value="title-desc">Title, Z–A</option>
        <option value="author-asc">Author, A–Z</option>
        <option value="year-asc">Year, oldest first</option>
        <option value="year-desc">Year, newest first</option>
      </select>
    </div>

    <span class="count-readout" id="count-readout" aria-live="polite"></span>
  </section>

  <main class="catalog" id="catalog" aria-label="Book catalog">
    <p class="empty-state">Loading the catalog…</p>
  </main>

  <footer class="site-footer">
    Catalog data lives in <code>books.json</code> — add a book by adding an entry there.
  </footer>

  <script src="script.js"></script>
</body>
</html>
